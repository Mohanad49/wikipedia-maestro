name: Maestro Mobile Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  maestro-tests:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Download Wikipedia APK
        run: |
          curl -L "https://github.com/wikimedia/apps-android-wikipedia/releases/download/r%2F2.7.50464-r-2024-05-13/app-prod-universal-release.apk" \
            -o wikipedia.apk
          echo "APK downloaded: $(du -h wikipedia.apk | cut -f1)"

      - name: Run Maestro tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            echo "Installing Wikipedia APK..."
            adb install wikipedia.apk
            echo "Waiting for app to be ready..."
            sleep 10
            echo "Running Maestro flows..."
            ~/.maestro/bin/maestro test .maestro/run_all.yaml --format junit --output maestro-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results
          path: maestro-results.xml
          retention-days: 30
