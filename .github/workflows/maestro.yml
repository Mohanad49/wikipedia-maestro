name: Maestro Mobile Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  maestro-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0660", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Download Wikipedia APK
        run: |
          curl -L --fail -o wikipedia.apk \
            "https://github.com/wikimedia/apps-android-wikipedia/releases/download/r%2F2.7.50464-r-2024-05-13/app-prod-universal-release.apk"
          ls -la wikipedia.apk
          file wikipedia.apk || true
          echo "APK size: $(du -h wikipedia.apk | cut -f1)"

      - name: Run Maestro tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            echo "Installing Wikipedia APK..."
            adb install wikipedia.apk
            echo "Waiting for app to be ready..."
            sleep 10
            echo "Running Maestro flows..."
            ~/.maestro/bin/maestro test .maestro/run_all.yaml --format junit --output maestro-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results
          path: maestro-results.xml
          retention-days: 30
